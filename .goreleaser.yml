version: 2
before:
  hooks:
    - go mod download
    - go mod tidy
    - go generate ./internal/static/
builds:
  -
    id: sess-darwin
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/stevencrawford/sess/version.Revision={{.ShortCommit}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
  -
    id: sess-windows
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/stevencrawford/sess/version.Revision={{.ShortCommit}}
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
  -
    id: sess-linux
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/stevencrawford/sess/version.Revision={{.ShortCommit}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
archives:
  -
    id: sess-archive
    name_template: '{{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}'
    format_overrides:
      - goos: darwin
        formats:
          - zip
    files:
      - LICENSE
      - CREDITS
      - README.md
      - CHANGELOG.md
checksum:
  name_template: 'checksums.txt'
changelog:
  sort: asc
  filters:
    exclude:
    - '^docs:'
    - '^test:'
nfpms:
  -
    id: sess-nfpms
    file_name_template: "{{ .ProjectName }}_{{ .Version }}-1_{{ .Arch }}"
    ids:
      - sess-linux
    homepage: https://github.com/stevencrawford/sess
    maintainer: Steven Crawford
    description: "sess is a CLI tool that watches AI coding agent sessions and presents them in a browser UI"
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    epoch: 1
release:
  use_existing_draft: true
