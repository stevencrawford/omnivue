<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Omnivue</title>
    <script>
      (function () {
        var theme = localStorage.getItem("omnivue-theme");
        var mode = localStorage.getItem("omnivue-mode");
        var names = ["default","nord","catppuccin","tokyo-night","github"];
        if (names.indexOf(theme) === -1) {
          theme = "default";
          if (mode !== "light" && mode !== "dark") {
            var old = localStorage.getItem("omnivue-theme");
            mode = (old === "light" || old === "dark") ? old : null;
          }
        }
        if (mode !== "light" && mode !== "dark") {
          mode = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", theme);
        document.documentElement.setAttribute("data-mode", mode);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
