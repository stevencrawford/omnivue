name: build

on:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'site/**'
      - '*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  job-test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "macos-latest"]') }}
    permissions:
      contents: ${{ github.event_name == 'pull_request' && 'read' || 'write' }}
      pull-requests: ${{ github.event_name == 'pull_request' && 'read' || 'write' }}
      actions: ${{ github.event_name == 'pull_request' && 'read' || 'write' }}
    steps:
      - name: Check out source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          package_json_file: internal/frontend/package.json

      - name: Generate frontend assets
        run: go generate ./internal/static/

      - name: Run oxlint
        if: runner.os == 'Linux' && github.event_name != 'pull_request'
        run: cd internal/frontend && pnpm install && pnpm run lint

      - name: Run oxfmt check
        if: runner.os == 'Linux' && github.event_name != 'pull_request'
        run: cd internal/frontend && pnpm run fmt:check

      - name: Run lint
        if: runner.os == 'Linux' && github.event_name != 'pull_request'
        uses: reviewdog/action-golangci-lint@c76cceaaab89abe74e649d2e34c6c9adc26662d2 # v2.10.0
        with:
          fail_level: error
          go_version_file: go.mod
          cache: false

      - name: Run gostyle
        if: runner.os == 'Linux' && github.event_name != 'pull_request'
        uses: k1LoW/gostyle-action@e1b847d37b3041c5fdb8b911bcf00b350779ca61 # v1.5.1
        with:
          config-file: .gostyle.yml

      - name: Run tests
        run: make test

      - name: Run octocov
        if: runner.os == 'Linux' && github.event_name != 'pull_request'
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1
