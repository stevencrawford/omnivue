name: Bug Report
description: File a bug report to help us improve
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output / logs
      description: Copy and paste any relevant output or logs.
      render: shell

  - type: input
    id: version
    attributes:
      label: Omnivue version
      description: What version of Omnivue are you running? (`omnivue --version`)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      description: What operating system are you on? (e.g. macOS 14.5, Ubuntu 24.04)
    validations:
      required: true

  - type: dropdown
    id: agents
    attributes:
      label: AI Agent(s) affected
      description: Which AI agent session(s) does this involve?
      multiple: true
      options:
        - OpenCode
        - Copilot
        - Cursor
        - Pi
        - Claude Code
        - Codex
        - Other / Not applicable

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or screen recordings here.
